name: Code quality

# Fork scoping: upstream runs this on every push, but the fork inherits
# lint debt from packages we don't ship (api, workspace, playground).
# Restrict push triggers to `main` so our merge branches and release
# tags don't fire it. PRs still get checked normally.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: 'package.json'
      - name: Install dependencies
        run: bun install
      - name: Lint check
        run: bun run lint:check
      - name: Type check
        run: bun run typecheck
